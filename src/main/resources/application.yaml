spring:
  application:
    name: academianet-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/academianet}
    username: ${DB_USERNAME:academianet}
    password: ${DB_PASSWORD:academianet}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    show-sql: ${JPA_SHOW_SQL:false}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

academianet:
  seed:
    enabled: ${SEED_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:academianet-dev-secret-change-me-please-min-32-bytes-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
