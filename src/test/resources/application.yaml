spring:
  datasource:
    url: jdbc:h2:mem:academianet;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # No hay Mongo en los tests. Los timeouts cortos (para que el registro de actividad
  # best-effort falle rápido en vez de bloquear 30 s) se fuerzan con un customizer:
  # ver com.academianet.demo.support.TestMongoConfig.
  data:
    mongodb:
      uri: mongodb://localhost:27017/academianet_test
      auto-index-creation: false

academianet:
  seed:
    enabled: false
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: test-secret-academianet-min-32-bytes-0123456789abcdef
    expiration-ms: 3600000
