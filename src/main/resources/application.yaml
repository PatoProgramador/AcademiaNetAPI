spring:
  application:
    name: academianet-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:academianet}}
    username: ${DB_USERNAME:academianet}
    password: ${DB_PASSWORD:academianet}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    show-sql: ${JPA_SHOW_SQL:false}

  # MongoDB: almacena datos auxiliares de usuario (preferencias y log de actividad).
  # El User "de verdad" sigue en PostgreSQL; Mongo solo guarda datos flexibles asociados
  # por userId. La conexión es perezosa: si Mongo no está disponible la app arranca igual
  # y el registro de actividad se degrada de forma silenciosa.
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/academianet}
      auto-index-creation: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

academianet:
  seed:
    enabled: ${SEED_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:academianet-dev-secret-change-me-please-min-32-bytes-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
