name: AcademiaNet CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Ejecutar tests unitarios
        run: mvn -B clean verify

      - name: Analisis SonarQube (Quality Gate)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url=$SONAR_HOST_URL
          -Dsonar.token=$SONAR_TOKEN
          -Dsonar.organization=$SONAR_ORGANIZATION
          -Dsonar.projectKey=$SONAR_PROJECT_KEY
          -Dsonar.qualitygate.wait=true

      - name: Compilar proyecto
        run: mvn -B clean package -DskipTests

      - name: Verificar el Jar generado
        run: ls -l target

      - name: Construir imagen Docker del backend
        run: docker build -t backend-spring .

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker para DockerHub
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/academianet-api:latest .

      - name: Subir imagen Docker a DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/academianet-api:latest

  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    env:
      USER_DOCKER_COMPOSE_RELATIVE_PATH: ${{ secrets.USER_DOCKER_COMPOSE_RELATIVE_PATH }}
    steps:
      - name: Actualizar contenedor backend
        run: >
          cd $USER_DOCKER_COMPOSE_RELATIVE_PATH
          docker compose pull backend
          docker compose up -d backend
