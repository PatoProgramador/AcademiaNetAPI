spring:
  datasource:
    url: jdbc:h2:mem:academianet;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

academianet:
  seed:
    enabled: false
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: test-secret-academianet-min-32-bytes-0123456789abcdef
    expiration-ms: 3600000
